services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: localbet
      POSTGRES_USER: localbet
      POSTGRES_PASSWORD: localbet
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U localbet"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: src/main/docker/Dockerfile.jvm
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_NAME: localbet
      DB_USER: localbet
      DB_PASS: localbet
    depends_on:
      db:
        condition: service_healthy
    profiles: ["full"]

volumes:
  postgres_data:
