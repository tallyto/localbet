quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:localbet}
quarkus.datasource.password=${DB_PASS:localbet}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:localbet}

quarkus.hibernate-orm.schema-management.strategy=none
quarkus.flyway.migrate-at-start=true

mp.jwt.verify.issuer=${JWT_ISSUER:https://localbet.app}
mp.jwt.verify.publickey.location=publicKey.pem
smallrye.jwt.sign.key.location=privateKey.pem
smallrye.jwt.new-token.issuer=${JWT_ISSUER:https://localbet.app}
smallrye.jwt.new-token.lifespan=${JWT_LIFESPAN:86400}

quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${CORS_ORIGINS:*}
quarkus.http.cors.methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,origin,x-requested-with
quarkus.http.port=${PORT:8080}
quarkus.log.level=${LOG_LEVEL:INFO}
quarkus.application.name=localbet
quarkus.application.version=1.1.0
quarkus.banner.enabled=false
