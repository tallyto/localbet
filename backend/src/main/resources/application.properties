quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:localbet}
quarkus.datasource.password=${DB_PASS:localbet}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:localbet}

quarkus.hibernate-orm.database.generation=none
quarkus.flyway.migrate-at-start=true

mp.jwt.verify.issuer=https://localbet.app
mp.jwt.verify.publickey.location=publicKey.pem
smallrye.jwt.sign.key.location=privateKey.pem
smallrye.jwt.new-token.issuer=https://localbet.app
smallrye.jwt.new-token.lifespan=86400

quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:5173
quarkus.http.port=8080
quarkus.log.level=INFO
